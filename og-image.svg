<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2D1F"/>
      <stop offset="100%" style="stop-color:#2D6A4F"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#E8D48B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern overlay -->
  <g opacity="0.04">
    <circle cx="100" cy="100" r="200" fill="#52B788"/>
    <circle cx="1100" cy="530" r="250" fill="#52B788"/>
    <circle cx="900" cy="50" r="150" fill="#52B788"/>
  </g>

  <!-- Decorative line -->
  <rect x="80" y="280" width="100" height="3" rx="2" fill="url(#gold-grad)"/>

  <!-- Shamrock icon -->
  <text x="600" y="200" font-size="100" text-anchor="middle" fill="#52B788" opacity="0.3">&#9752;</text>

  <!-- Main title -->
  <text x="600" y="340" font-family="Georgia, 'Playfair Display', serif" font-size="72" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">
    Guia Dublin 2026
  </text>

  <!-- Subtitle -->
  <text x="600" y="400" font-family="'Segoe UI', 'Nunito', sans-serif" font-size="26" fill="#D8F3DC" text-anchor="middle" letter-spacing="1">
    Guia completo para brasileiros na Irlanda
  </text>

  <!-- Gold divider -->
  <rect x="470" y="430" width="260" height="2" rx="1" fill="url(#gold-grad)"/>

  <!-- Brand name -->
  <text x="600" y="480" font-family="Georgia, 'Playfair Display', serif" font-size="22" fill="#C9A84C" text-anchor="middle" letter-spacing="3">
    NOS VIAJANTE
  </text>

  <!-- Bottom decorative line -->
  <rect x="0" y="610" width="1200" height="20" fill="#52B788" opacity="0.3"/>

  <!-- Irish flag accent -->
  <rect x="0" y="0" width="6" height="630" fill="#52B788"/>
  <rect x="1194" y="0" width="6" height="630" fill="#C9A84C"/>
</svg>
