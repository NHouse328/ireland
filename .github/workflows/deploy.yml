name: Version Bump & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine version bump type
        id: bump
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -qiE "^feat(\(|:)"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: version
        run: |
          CURRENT=$(jq -r .version version.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "${{ steps.bump.outputs.type }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping $CURRENT → $NEW_VERSION (${{ steps.bump.outputs.type }})"

          # Update version.json
          echo "{\"version\":\"$NEW_VERSION\"}" | jq . > version.json

          # Update version in sidebar of index.html
          sed -i "s|<div class=\"sidebar-version\">v[0-9]*\.[0-9]*\.[0-9]*</div>|<div class=\"sidebar-version\">v${NEW_VERSION}</div>|g" index.html

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json index.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }}"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name ireland
